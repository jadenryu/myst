methodology_space: forest_cover_loss
version: 0.0.0-stub
description: >
  Structural stub for testing the methodology-space loader.
  Replace with the curated v1.0.0 artifact before real use.

axes:
  - id: satellite_product
    description: The source dataset used to measure forest cover and loss.
    options:
      # Forest-change products (most directly relevant to *loss*)
      - value: hansen_gfc
        label: Hansen Global Forest Change v1.12 (2000–2024, 30 m)
        citation: "Hansen et al. 2013, Science 342:850-853 [VERIFY]"
      - value: jrc_tmf
        label: JRC Tropical Moist Forest (30 m, 1990–2025)
        citation: "Vancutsem et al. 2021, Science Advances [VERIFY]"
      - value: gfcc30tc
        label: NASA MEaSUREs Global Forest Cover Change Tree Cover (30 m)
        citation: "NASA LP DAAC, doi:10.5067/MEASURES/GFCC/GFCC30TC.003 [VERIFY]"

      # Fractional tree-cover products (% canopy you threshold yourself)
      - value: modis_vcf
        label: MODIS Vegetation Continuous Fields (MOD44B, 250 m)
        citation: "DiMiceli et al., NASA LP DAAC [VERIFY]"
      - value: globmap_ftc
        label: GLOBMAP Fractional Tree Cover (250 m, 2000–2021)
        citation: "Scientific Data 2024 [VERIFY]"
      - value: gfw_ttc
        label: GFW Tropical Tree Cover (Sentinel-2, 10 m, tropics)
        citation: "WRI / Global Forest Watch [VERIFY]"

      # General land-cover products (forest as a class; mainly extent, not loss)
      - value: esa_worldcover
        label: ESA WorldCover (10 m, 2020 & 2021)
        citation: "Zanaga et al. 2021/2022 [VERIFY]"
      - value: esa_cci_lc
        label: ESA CCI Land Cover (300 m, annual from 1992)
        citation: "ESA Climate Change Initiative [VERIFY]"
      - value: cgls_lc100
        label: Copernicus Global Land Service Land Cover (100 m)
        citation: "Buchhorn et al. 2020 [VERIFY]"
      - value: modis_mcd12q1
        label: MODIS Land Cover (MCD12Q1, 500 m, annual from 2001)
        citation: "Friedl et al. 2010 [VERIFY]"
      - value: dynamic_world
        label: Dynamic World (Sentinel-2, 10 m, near-real-time)
        citation: "Brown et al. 2022, Scientific Data [VERIFY]"
      - value: esri_lulc
        label: Esri Land Use Land Cover (Sentinel-2, 10 m, annual)
        citation: "Karra et al. 2021 [VERIFY]"

  - id: canopy_cover_threshold_pct
    description: Minimum canopy cover for a pixel to count as forest.
    options:
      - value: 10
        citation: "PLACEHOLDER - verify and replace"
      - value: 30
        citation: "PLACEHOLDER - verify and replace"
  
  - id: loss_definition
    description: What land-cover or land-use change counts as "loss".
    options:
      - value: stand_replacement
        label: Stand-replacement disturbance (biophysical, any cause)
        citation: "Hansen et al. 2013, Science 342:850-853; Hansen, Stehman & Potapov 2010, PNAS [VERIFY]"
      - value: land_use_conversion
        label: IPCC/FAO deforestation — long-term forest→non-forest land use
        citation: "IPCC; FAO FRA 2025 Terms and Definitions [VERIFY]"
      - value: deforestation_plus_degradation
        label: Inclusive — long-term conversion plus degradation (selective logging, fire, edges)
        citation: "Vancutsem et al. 2021, Science Advances (JRC TMF approach) [VERIFY]"

  - id: loss_accounting
    description: How tree-cover gain or regrowth is treated in the loss measurement.
    options:
      - value: gross
        label: Gross loss — total loss, regardless of any gain in the same period
        citation: "WRI Global Forest Review; NYDF Goal 1 (2019) definition [VERIFY]"
      - value: net
        label: Net loss — gross loss minus regenerated/reforested area
        citation: "FAO FRA net forest change; NYDF Goal 1 (2019) definition [VERIFY]"
      
  - id: minimum_mapping_unit_ha
    description: Smallest contiguous patch counted as forest (or as forest loss).
    options:
      - value: 0.05
        label: IPCC lower bound for forest land definition
        citation: "IPCC 2006 Guidelines, Volume 4 Chapter 4 [VERIFY]"
      - value: 0.1
        label: Common lower threshold in national definitions
        citation: "Carter et al. 2024, Communications Earth & Environment [VERIFY]"
      - value: 0.4
        label: US / IPCC US national inventory threshold (~1 acre)
        citation: "US EPA GHG Inventory 2024, Chapter 6 (LULUCF) [VERIFY]"
      - value: 0.5
        label: FAO forest definition
        citation: "FAO FRA 2025 Terms and Definitions [VERIFY]"
      - value: 1.0
        label: Common operational threshold (e.g. Brazil operational systems)
        citation: "Carter et al. 2024, Communications Earth & Environment [VERIFY]"
    

  - id: spatial_boundary_convention
    description: The convention used to define the region's polygon.
    options:
      - value: biogeographic
        label: Biogeographic/biome boundary (e.g. RAISG for Amazon)
        citation: "RAISG (Red Amazónica de Información Socioambiental Georreferenciada), 2020 [VERIFY]"
      - value: watershed
        label: Watershed / hydrological basin boundary
        citation: "HydroSHEDS / Amazon River Basin definition [VERIFY]"
      - value: administrative
        label: Political/administrative boundary (e.g. country, state, Legal Amazon)
        citation: "GADM database; Brazil Legal Amazon Decreto-Lei No. 5.173/1966 [VERIFY]"
      - value: ecoregion
        label: WWF Terrestrial Ecoregions of the World (TEOW)
        citation: "Olson et al. 2001, BioScience [VERIFY]"
      - value: hybrid
        label: Combination designed for maximum inclusion (e.g. MAAP approach)
        citation: "MAAP — Monitoring of the Andean Amazon Project [VERIFY]"
  
  - id: plantation_treatment
    description: How planted/plantation forest is treated in the analysis.
    options:
      - value: include_all
        label: FAO approach — plantations counted as forest
        citation: "FAO FRA 2025 Terms and Definitions; SDG 15.1.1 metadata [VERIFY]"
      - value: exclude_commercial_plantations
        label: Natural-forest-only — excludes commercial monoculture plantations
        citation: "UN-REDD natural forest definitions report (2016) [VERIFY]"
      - value: primary_forest_only
        label: Strictest — only undisturbed primary forest counts
        citation: "Turubanova et al. 2018, Environmental Research Letters (UMD primary forest layer) [VERIFY]"